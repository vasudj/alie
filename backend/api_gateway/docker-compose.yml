version: "3.9"

services:

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zombie-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Gateway ───────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zombie-gateway
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8000
      LOG_LEVEL: INFO
      RISK_BLOCK_THRESHOLD: "0.75"
      RISK_WARN_THRESHOLD: "0.40"
      RATE_MAX_REQUESTS: "200"
      BACKEND_ROUTES: >
        {
          "/api/users":    "http://mock-backend:9001",
          "/api/products": "http://mock-backend:9002",
          "/api/orders":   "http://mock-backend:9003",
          "/api/internal": "http://mock-backend:9004"
        }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Brain Worker ──────────────────────────────────────────────────────────────
  brain-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zombie-brain
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["python", "-m", "workers.brain_worker"]

  # ── Mock Backend Services ─────────────────────────────────────────────────────
  mock-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zombie-backends
    restart: unless-stopped
    ports:
      - "9001:9001"
      - "9002:9002"
      - "9003:9003"
      - "9004:9004"
    command: ["python", "scripts/mock_backend.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
