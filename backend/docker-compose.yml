version: '3.8'

services:
  # Main Banking Backend
  banking-backend:
    build: .
    container_name: banking-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://bank_user:bank_password@postgres:5432/banking_db
      - SECRET_KEY=super-secret-key-for-jwt-tokens-2019
      - DEBUG=False
      - STRIPE_SECRET_KEY=your_stripe_secret_key
      - AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE
      - AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      - BILLING_SERVICE_URL=http://billing-service:8001
      - FRAUD_SERVICE_URL=http://fraud-service:8002
      - NOTIFICATION_SERVICE_URL=http://notification-service:8003
      - ENABLE_LEGACY_ENDPOINTS=true
      - ENABLE_INTERNAL_ENDPOINTS=true
    depends_on:
      - postgres
      - billing-service
      - fraud-service
      - notification-service
    volumes:
      - ./app:/app/app
    networks:
      - banking-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: banking-db
    environment:
      - POSTGRES_USER=bank_user
      - POSTGRES_PASSWORD=bank_password
      - POSTGRES_DB=banking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - banking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Billing Service Mock (Internal)
  billing-service:
    image: python:3.11-slim
    container_name: billing-service
    working_dir: /app
    command: >
      bash -c "
      pip install fastapi uvicorn &&
      python -c \"
      from fastapi import FastAPI
      import uvicorn
      app = FastAPI()
      @app.post('/api/create')
      def create_invoice(account_id: str, amount: float, description: str):
          return {'status': 'created', 'invoice_id': 'INV001'}
      @app.post('/api/create')
      def create_invoice(account_id: str, amount: float, description: str):
          return {'status': 'created', 'invoice_id': 'INV001'}
      if __name__ == '__main__':
          uvicorn.run(app, host='0.0.0.0', port=8001)
      \"
      "
    ports:
      - "8001:8001"
    networks:
      - banking-network

  # Fraud Detection Service Mock (Internal)
  fraud-service:
    image: python:3.11-slim
    container_name: fraud-service
    working_dir: /app
    command: >
      bash -c "
      pip install fastapi uvicorn &&
      python -c \"
      from fastapi import FastAPI
      import uvicorn
      app = FastAPI()
      @app.post('/check')
      def check_fraud(account_id: str, amount: float, type: str):
          return {'fraud': False, 'score': 0.1}
      if __name__ == '__main__':
          uvicorn.run(app, host='0.0.0.0', port=8002)
      \"
      "
    ports:
      - "8002:8002"
    networks:
      - banking-network

  # Notification Service Mock (Internal)
  notification-service:
    image: python:3.11-slim
    container_name: notification-service
    working_dir: /app
    command: >
      bash -c "
      pip install fastapi uvicorn &&
      python -c \"
      from fastapi import FastAPI
      import uvicorn
      app = FastAPI()
      @app.post('/send')
      def send_notification(user_id: str, message: str, type: str):
          return {'status': 'sent'}
      if __name__ == '__main__':
          uvicorn.run(app, host='0.0.0.0', port=8003)
      \"
      "
    ports:
      - "8003:8003"
    networks:
      - banking-network

volumes:
  postgres_data:

networks:
  banking-network:
    driver: bridge
